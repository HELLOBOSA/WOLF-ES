    <style>
      body{margin:0;background:#f5f0eb;color:#0d0b0a;font-family:Helvetica,Arial,sans-serif}

      footer a{color:inherit;text-decoration:none}
      footer a:hover{color:#9a6840}
      .cookie-banner{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:1200;width:max-content;max-width:calc(100vw - 32px);display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 10px 8px 16px;border:1px solid rgba(154,104,64,.18);background:rgba(154,104,64,.18);backdrop-filter:blur(16px);border-radius:999px;color:#0d0b0a;box-shadow:0 18px 45px rgba(13,11,10,.08)}
      .cookie-banner[hidden]{display:none}
      .cookie-copy{display:flex;align-items:center;gap:9px;min-width:0}
      .cookie-title,.cookie-btn{font-size:.6rem;font-weight:300;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap}
      .cookie-link{font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:#6b6057;text-decoration:underline;text-underline-offset:4px;white-space:nowrap}
      .cookie-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
      .cookie-btn{border:0;background:transparent;color:#6b6057;padding:6px 9px;border-radius:999px;font-family:inherit;font-weight:300;line-height:1;cursor:pointer;appearance:none;-webkit-appearance:none}

      @media(max-width:760px){footer>span{flex:0 0 100%;text-align:center}footer>span:nth-child(3){text-align:center}}
      @media(max-width:520px){.cookie-banner{bottom:16px;max-width:calc(100vw - 20px);padding:8px 9px 8px 12px;gap:7px}.cookie-copy{gap:7px}.cookie-title,.cookie-btn{font-size:.5rem;letter-spacing:.12em}.cookie-link{font-size:.46rem;letter-spacing:.12em}.cookie-actions{gap:6px}.cookie-btn{padding:6px 7px}.cookie-btn.accept{padding:6px 9px}}

    </footer>
    <div class="cookie-banner" id="cookie-banner" role="region" aria-label="Aviso de cookies" hidden>
      <div class="cookie-copy">
        <span class="cookie-title">Usamos cookies</span>
        <a class="cookie-link" href="/legal/#cookies">Más info</a>
      </div>
      <div class="cookie-actions">
        <button class="cookie-btn" type="button" data-cookie-choice="reject">Rechazar</button>
        <button class="cookie-btn accept" type="button" data-cookie-choice="accept">Aceptar</button>
      </div>
    </div>
    <script>
    (function(){
      var banner=document.getElementById('cookie-banner');
      if(!banner)return;
      var storageKey='wb-cookie-choice';
      var consentDays=180;
      function expiryTime(){return Date.now()+consentDays*24*60*60*1000;}
      function readChoice(){
        var raw=localStorage.getItem(storageKey);
        if(!raw)return null;
        try{
          var saved=JSON.parse(raw);
          if(saved&&saved.expires&&saved.expires>Date.now())return saved.choice||'saved';
          localStorage.removeItem(storageKey);
          return null;
        }catch(e){
          localStorage.setItem(storageKey,JSON.stringify({choice:raw,expires:expiryTime()}));
          return raw;
        }
      }
      function closeBanner(choice){
        localStorage.setItem(storageKey,JSON.stringify({choice:choice,expires:expiryTime()}));
        banner.hidden=true;
        document.body.classList.remove('cookie-banner-visible');
      }
      if(!readChoice()){banner.hidden=false;document.body.classList.add('cookie-banner-visible');}
      banner.querySelectorAll('[data-cookie-choice]').forEach(function(btn){
        btn.addEventListener('click',function(){closeBanner(btn.getAttribute('data-cookie-choice'));});
      });
    })();
    </script>
